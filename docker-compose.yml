version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-studio-new  # Change this line
    ports:
      - "8081:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./css:/usr/share/nginx/html/css:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

  # Optional: Backend API service (Cloudflare Worker placeholder)
  # api:
  #   image: node:20-alpine
  #   container_name: yt-studio-api
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./api:/app
  #   working_dir: /app
  #   command: node server.js
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
