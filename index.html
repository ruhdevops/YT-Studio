<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
    <p>Islamic Documentary Series</p>
  </header>

  <!-- ✅ FIXED FEATURED (ALWAYS VISIBLE) -->
  <section class="featured" id="featured">
    <div class="featured-overlay">
      <h2 id="featured-title">Loading episodes...</h2>
      <button id="featured-btn">▶ Watch Now</button>
    </div>
  </section>

  <div id="video-grid" class="grid"></div>

  <!-- MODAL -->
  <div id="video-modal" class="modal">
    <div class="modal-content">
      <span id="close-modal">×</span>

      <iframe
        id="modal-player"
        frameborder="0"
        allow="autoplay; encrypted-media; fullscreen"
        allowfullscreen>
      </iframe>

      <div class="details">
        <h3 id="episode-title"></h3>
        <p id="episode-meta"></p>
        <button id="next-btn">Next ▶</button>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
