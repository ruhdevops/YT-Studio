<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 🎨 HEADER -->
  <div class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
    <p>Islamic Documentary Series</p>
  </div>

  <!-- 📦 ABOUT BOX -->
  <div class="about-box">
    <p>
      A cinematic Tamil Islamic documentary series exploring history,
      prophecy, and hidden truths.
    </p>
  </div>

  <!-- 🎬 FEATURED -->
  <section class="featured" id="featured">
    <div class="featured-overlay">
      <h1 id="featured-title"></h1>
      <button id="featured-btn">▶ Watch Now</button>
    </div>
  </section>

  <!-- 📺 SEASON FILTER -->
  <div class="season-bar">
    <button class="season-btn active" data-season="all">All</button>
    <button class="season-btn" data-season="1">Season 1</button>
    <button class="season-btn" data-season="2">Season 2</button>
  </div>

  <!-- GRID -->
  <div id="video-grid"></div>

  <!-- 🎥 MODAL -->
  <div id="video-modal" class="modal">
    <div class="modal-content">
      <span id="close-modal">&times;</span>

      <iframe id="modal-player" allow="autoplay; fullscreen"></iframe>

      <div class="details">
        <h2 id="episode-title"></h2>
        <p id="episode-meta"></p>
        <button id="next-btn">⏭ Next Episode</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
