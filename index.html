<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
    <p>Islamic Documentary Series</p>
  </header>

  <!-- FEATURED BANNER -->
  <section id="featured-banner" class="featured">
    <div class="overlay">
      <h1 id="featured-title">Loading...</h1>
      <p id="featured-meta"></p>
      <button id="play-btn">▶ Watch Now</button>
    </div>
  </section>

  <!-- FILTER -->
  <section class="filters">
    <button class="season-btn active" data-season="all">All</button>
    <button class="season-btn" data-season="season1">Season 1</button>
    <button class="season-btn" data-season="season2">Season 2</button>
  </section>

  <!-- GRID -->
  <section class="episodes">
    <div id="video-grid" class="grid"></div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
