<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ruh Al Tarikh</title>
  <meta name="description" content="Islamic Documentary Series - Ruh Al Tarikh" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
    <p>Islamic Documentary Series</p>
  </header>

  <!-- FEATURED BANNER -->
  <section id="featured-banner" class="featured">
    <div class="overlay">
      <h1 id="featured-title">Loading...</h1>
      <p id="featured-meta"></p>

      <button id="play-btn" type="button">
        ▶ Watch Now
      </button>
    </div>
  </section>

  <!-- FILTER BUTTONS -->
  <section class="filters">
    <button class="season-btn active" data-season="all" type="button">All</button>
    <button class="season-btn" data-season="season1" type="button">Season 1</button>
    <button class="season-btn" data-season="season2" type="button">Season 2</button>
  </section>

  <!-- VIDEO GRID -->
  <main class="episodes">
    <div id="video-grid" class="grid"></div>
  </main>

  <!-- SCRIPT -->
  <script src="js/app.js" defer></script>

</body>
</html>
