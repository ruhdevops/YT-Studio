<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://yt-studio-api.ruhdevopsytstudio.workers.dev">
  <link rel="dns-prefetch" href="https://yt-studio-api.ruhdevopsytstudio.workers.dev">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="bg"></div>

<header class="header">
  <div class="header-content">
    <h1>🎬 RUH AL TARIKH</h1>
    <p class="header-tagline">Uncovering the truth (Haqq) through Islamic history</p>
  </div>
</header>

<div id="app-root">
  <div id="loading-state" class="loading-state" style="display: none;">
    <div class="spinner"></div>
    <p>Loading premium content...</p>
  </div>
  
  <div id="error-container" class="error-container" style="display: none;">
    <p id="error-message"></p>
    <button id="retry-btn">Retry</button>
  </div>

  <section class="hero">

      <button id="hero-btn">▶ Watch Now</button>
    </div>
  </section>

  <div id="continue-row" class="row" style="display: none;"></div>

  <h2 class="section">Episodes</h2>
  <div id="grid" class="grid"></div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <button id="close" class="close-btn" aria-label="Close modal">&times;</button>
      <iframe id="player" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe></iframe>
      <h2 id="video-title" class="modal-title"></h2>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <p>© 2026 Ruh Al Tarikh. All rights reserved.</p>
    <p class="footer-tagline">Uncovering the truth (Haqq) through Islamic history</p>
  </div>

<script src="js/app.js" type="module" defer></script>
<button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>
