<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
    <p>Islamic Documentary Series</p>
  </div>

  <div class="about-box">
    <p>
      A cinematic Tamil Islamic documentary series exploring history and hidden truths.
    </p>
  </div>

  <section class="featured" id="featured">
    <div class="featured-overlay">
      <h1 id="featured-title"></h1>
      <button id="featured-btn">▶ Watch Now</button>
    </div>
  </section>

  <!-- 📺 CONTINUE -->
  <div id="continue-section" style="display:none;">
    <h2>Continue Watching</h2>
    <div id="continue-row" class="row"></div>
  </div>

  <!-- 🔥 TRENDING -->
  <h2>🔥 Trending</h2>
  <div id="trending-row" class="row"></div>

  <!-- 🆕 LATEST -->
  <h2>🆕 Latest</h2>
  <div id="latest-row" class="row"></div>

  <!-- 📺 SEASON ROW -->
  <h2>Season 1</h2>
  <div id="season1-row" class="row"></div>

  <h2>Season 2</h2>
  <div id="season2-row" class="row"></div>

 <!-- 🎥 MODAL -->
<div id="video-modal" class="modal">
  <div class="modal-content">
    <span id="close-modal">&times;</span>

    <iframe 
      id="modal-player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

    <div class="details">
      <h2 id="episode-title"></h2>
      <p id="episode-meta"></p>
      <button id="next-btn">⏭ Next Episode</button>
    </div>
  </div>
</div>

  <script src="js/app.js"></script>
</body>
</html>
